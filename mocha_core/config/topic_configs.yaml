  # Transmit one compact VAE keyframe instead of separate odom + latent topics.
  # Local publisher should publish super_lio_lamp_adapter/KeyframeVae on /keyframe_vae.
  # Remote topic_publisher republishes it as /<robot_name>/keyframe_vae.
  - msg_topic: "/keyframe_vae"
    msg_type: "super_lio_lamp_adapter/KeyframeVae"
    msg_priority: "HIGH_PRIORITY"
    msg_history: "WHOLE_HISTORY"



